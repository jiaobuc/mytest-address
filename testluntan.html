<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线论坛系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #333; }

    .header {
      background: #2c3e50;
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 18px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-right span { font-size: 14px; }
    .header-right button {
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 5px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 13px;
    }
    .header-right button:hover { opacity: 0.85; }

    .container { max-width: 800px; margin: 20px auto; padding: 0 16px; }

    /* 登录区 */
    .login-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 30px;
      text-align: center;
      margin-top: 60px;
    }
    .login-box h2 { margin-bottom: 20px; font-size: 20px; }
    .login-box input {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      width: 200px;
      margin-bottom: 10px;
    }
    .login-box button {
      padding: 8px 24px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    .login-box button:hover { background: #2980b9; }

    /* 发帖区 */
    .post-form {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .post-form textarea {
      width: 100%;
      min-height: 70px;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      outline: none;
    }
    .post-form textarea:focus { border-color: #3498db; }
    .post-form .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .btn {
      padding: 6px 18px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-primary { background: #3498db; color: #fff; }
    .btn-primary:hover { background: #2980b9; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-link { background: none; color: #3498db; padding: 0; text-decoration: underline; font-size: 13px; }
    .btn-link:hover { color: #2980b9; }
    .btn-sm { padding: 3px 10px; font-size: 12px; }

    /* 帖子列表 */
    .post-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .post-author {
      font-weight: 700;
      color: #2c3e50;
      font-size: 14px;
    }
    .post-time { font-size: 12px; color: #999; }
    .post-content { font-size: 14px; line-height: 1.6; margin-bottom: 10px; white-space: pre-wrap; }
    .post-actions { display: flex; gap: 12px; }

    /* 回复区 */
    .replies {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }
    .reply-item {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .reply-item:last-child { border-bottom: none; }
    .reply-author { font-weight: 600; font-size: 13px; color: #2c3e50; min-width: 60px; }
    .reply-content { font-size: 13px; color: #555; flex: 1; }
    .reply-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .reply-time { font-size: 11px; color: #aaa; }

    .reply-form {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }
    .reply-form input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    .reply-form input:focus { border-color: #3498db; }

    .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header" id="header" style="display:none;">
    <h1>在线论坛系统</h1>
    <div class="header-right">
      <span id="currentUser"></span>
      <button onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="container">

    <!-- 登录页面 -->
    <div id="loginPage">
      <div class="login-box">
        <h2>在线论坛系统</h2>
        <input type="text" id="usernameInput" placeholder="请输入用户名" onkeydown="if(event.key==='Enter')login()">
        <br>
        <button onclick="login()">登录</button>
      </div>
    </div>

    <!-- 论坛主页 -->
    <div id="forumPage" style="display:none;">
      <!-- 发帖 -->
      <div class="post-form">
        <textarea id="newPostContent" placeholder="发表你的帖子..."></textarea>
        <div class="actions">
          <button class="btn btn-primary" onclick="addPost()">发表</button>
        </div>
      </div>

      <!-- 帖子列表 -->
      <div id="postList"></div>
    </div>

  </div>

<script>
  let currentUser = null;

  // 初始示例数据
  let posts = [
    { id: 1, author: 'admin', content: '这是一个自动发布的内容，欢迎来到论坛！', time: '10分钟前', replies: [
      { author: 'tony', content: '你好，论坛看起来不错！', time: '5分钟前' },
      { author: 'user01', content: '第一次来，大家好。', time: '2分钟前' }
    ]},
    { id: 2, author: 'admin', content: '这是一个测试帖子，用于演示论坛功能。', time: '8分钟前', replies: [] }
  ];

  let nextId = 3;

  // ─── 登录 ───
  function login() {
    const name = document.getElementById('usernameInput').value.trim();
    if (!name) { alert('请输入用户名'); return; }
    currentUser = name;
    document.getElementById('header').style.display = 'flex';
    document.getElementById('currentUser').textContent = name;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('forumPage').style.display = 'block';
    renderPosts();
  }

  function logout() {
    currentUser = null;
    document.getElementById('header').style.display = 'none';
    document.getElementById('forumPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'block';
    document.getElementById('usernameInput').value = '';
  }

  // ─── 发帖 ───
  function addPost() {
    const content = document.getElementById('newPostContent').value.trim();
    if (!content) { alert('内容不能为空'); return; }
    posts.unshift({
      id: nextId++,
      author: currentUser,
      content: content,
      time: '刚刚',
      replies: []
    });
    document.getElementById('newPostContent').value = '';
    renderPosts();
  }

  // ─── 删除帖子 ───
  function deletePost(id) {
    if (!confirm('确定删除这条帖子吗？')) return;
    posts = posts.filter(p => p.id !== id);
    renderPosts();
  }

  // ─── 修改帖子 ───
  function editPost(id) {
    const post = posts.find(p => p.id === id);
    if (!post) return;
    const newContent = prompt('修改帖子内容：', post.content);
    if (newContent !== null && newContent.trim()) {
      post.content = newContent.trim();
      renderPosts();
    }
  }

  // ─── 回复 ───
  function addReply(postId) {
    const input = document.getElementById('reply-' + postId);
    const content = input.value.trim();
    if (!content) return;
    const post = posts.find(p => p.id === postId);
    if (!post) return;
    post.replies.push({
      author: currentUser,
      content: content,
      time: '刚刚'
    });
    input.value = '';
    renderPosts();
  }

  // ─── 删除回复 ───
  function deleteReply(postId, replyIndex) {
    if (!confirm('确定删除这条回复吗？')) return;
    const post = posts.find(p => p.id === postId);
    if (!post) return;
    post.replies.splice(replyIndex, 1);
    renderPosts();
  }

  // ─── 渲染 ───
  function renderPosts() {
    const list = document.getElementById('postList');
    if (posts.length === 0) {
      list.innerHTML = '<div class="empty">暂无帖子</div>';
      return;
    }

    list.innerHTML = posts.map(p => {
      const canEdit = p.author === currentUser || currentUser === 'admin';
      const repliesHtml = p.replies.map((r, i) => {
        const canDelReply = r.author === currentUser || currentUser === 'admin';
        return `
          <div class="reply-item">
            <span class="reply-author">${r.author}</span>
            <div style="flex:1">
              <span class="reply-content">${r.content}</span>
              <div class="reply-meta">
                <span class="reply-time">${r.time}</span>
                ${canDelReply ? '<button class="btn-link btn-sm" onclick="deleteReply('+p.id+','+i+')">删除</button>' : ''}
              </div>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="post-card">
          <div class="post-header">
            <span class="post-author">${p.author}</span>
            <span class="post-time">${p.time}</span>
          </div>
          <div class="post-content">${p.content.replace(/</g,'&lt;')}</div>
          <div class="post-actions">
            ${canEdit ? '<button class="btn btn-primary btn-sm" onclick="editPost('+p.id+')">修改</button>' : ''}
            ${canEdit ? '<button class="btn btn-danger btn-sm" onclick="deletePost('+p.id+')">删除</button>' : ''}
          </div>
          <div class="replies">
            ${p.replies.length > 0 ? repliesHtml : ''}
            <div class="reply-form">
              <input type="text" id="reply-${p.id}" placeholder="回复..." onkeydown="if(event.key==='Enter')addReply(${p.id})">
              <button class="btn btn-primary btn-sm" onclick="addReply(${p.id})">回复</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }
</script>
</body>
</html>
