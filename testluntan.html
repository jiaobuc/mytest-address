<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线论坛系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }

    .header {
      background: #2c3e50; color: #fff; padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 18px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-right span { font-size: 14px; }

    .btn { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .btn-primary { background: #3498db; color: #fff; }
    .btn-primary:hover { background: #2980b9; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-success:hover { background: #219a52; }
    .btn-sm { padding: 3px 10px; font-size: 12px; }

    .container { max-width: 800px; margin: 20px auto; padding: 0 16px; }

    /* 登录注册 */
    .auth-box {
      background: #fff; border: 1px solid #ddd; border-radius: 8px;
      padding: 36px 32px; max-width: 380px; margin: 80px auto;
    }
    .auth-box h2 { text-align: center; margin-bottom: 24px; font-size: 20px; color: #2c3e50; }
    .auth-box .tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #eee; }
    .auth-box .tabs span {
      flex: 1; text-align: center; padding: 10px; cursor: pointer;
      font-size: 15px; color: #999; transition: all 0.2s;
    }
    .auth-box .tabs span.active { color: #3498db; border-bottom: 2px solid #3498db; margin-bottom: -2px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #555; }
    .form-group input {
      width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 4px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #3498db; }
    .auth-box .btn { width: 100%; padding: 10px; font-size: 15px; margin-top: 8px; }

    /* 发帖 */
    .post-form {
      background: #fff; border: 1px solid #ddd; border-radius: 8px;
      padding: 20px; margin-bottom: 20px;
    }
    .post-form h3 { margin-bottom: 14px; font-size: 16px; color: #2c3e50; }
    .post-form input, .post-form textarea {
      width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 4px;
      font-size: 14px; font-family: inherit; outline: none; margin-bottom: 10px;
    }
    .post-form input:focus, .post-form textarea:focus { border-color: #3498db; }
    .post-form textarea { min-height: 80px; resize: vertical; }
    .post-form .actions { text-align: right; }

    /* 帖子 */
    .post-card {
      background: #fff; border: 1px solid #ddd; border-radius: 8px;
      padding: 18px 20px; margin-bottom: 12px;
    }
    .post-title {
      font-size: 17px; font-weight: 700; color: #2c3e50; margin-bottom: 6px;
    }
    .post-content { font-size: 14px; line-height: 1.6; color: #555; margin-bottom: 10px; white-space: pre-wrap; }
    .post-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: #999; padding-bottom: 10px; border-bottom: 1px solid #eee;
    }
    .post-meta .author { color: #3498db; font-weight: 600; }
    .post-meta .ops { display: flex; gap: 8px; }

    /* 回复区 */
    .replies-area { padding-top: 10px; }
    .reply-item {
      display: flex; gap: 10px; padding: 8px 0;
      border-bottom: 1px solid #f5f5f5; font-size: 13px;
    }
    .reply-item:last-child { border-bottom: none; }
    .reply-author { font-weight: 600; color: #2c3e50; min-width: 60px; flex-shrink: 0; }
    .reply-text { color: #555; flex: 1; }
    .reply-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .reply-time { color: #bbb; font-size: 11px; }
    .reply-del { background:none; border:none; color:#ccc; cursor:pointer; font-size:11px; }
    .reply-del:hover { color: #e74c3c; }

    .reply-form {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .reply-form input {
      flex: 1; padding: 7px 12px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 13px; outline: none;
    }
    .reply-form input:focus { border-color: #3498db; }

    .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
    .stat-bar { display: flex; gap: 20px; margin-bottom: 20px; font-size: 13px; color: #777; }
    .stat-bar b { color: #2c3e50; }
    .msg { text-align:center; padding:8px; margin-bottom:10px; border-radius:4px; font-size:13px; display:none; }
    .msg.ok { background:#d4edda; color:#155724; }
    .msg.err { background:#f8d7da; color:#721c24; }
  </style>
</head>
<body>

  <div class="header" id="header" style="display:none;">
    <h1>在线论坛系统</h1>
    <div class="header-right">
      <span id="currentUser"></span>
      <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="container">
    <!-- 登录/注册 -->
    <div id="authPage">
      <div class="auth-box">
        <h2>在线论坛系统</h2>
        <div class="tabs">
          <span class="active" onclick="switchTab('login')">登录</span>
          <span onclick="switchTab('register')">注册</span>
        </div>
        <div id="msg" class="msg"></div>
        <div id="loginForm">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="loginUser" placeholder="请输入用户名" onkeydown="if(event.key==='Enter')doLogin()">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPass" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
          </div>
          <button class="btn btn-primary" onclick="doLogin()">登录</button>
        </div>
        <div id="registerForm" style="display:none;">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="regUser" placeholder="请设置用户名" onkeydown="if(event.key==='Enter')doRegister()">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="regPass" placeholder="请设置密码" onkeydown="if(event.key==='Enter')doRegister()">
          </div>
          <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="regPass2" placeholder="再次输入密码" onkeydown="if(event.key==='Enter')doRegister()">
          </div>
          <button class="btn btn-success" onclick="doRegister()">注册</button>
        </div>
      </div>
    </div>

    <!-- 论坛 -->
    <div id="forumPage" style="display:none;">
      <div class="stat-bar">
        <span>注册用户：<b id="statUsers">0</b></span>
        <span>帖子总数：<b id="statPosts">0</b></span>
      </div>
      <div class="post-form">
        <h3>发表新帖</h3>
        <div id="postMsg" class="msg"></div>
        <input type="text" id="newTitle" placeholder="请输入帖子标题">
        <textarea id="newContent" placeholder="请输入帖子内容..."></textarea>
        <div class="actions">
          <button class="btn btn-primary" onclick="addPost()">发表</button>
        </div>
      </div>
      <div id="postList"></div>
    </div>
  </div>

<script>
  // ─── 存储 ───
  function load(k, d) { try { return JSON.parse(localStorage.getItem(k)) || d; } catch(e) { return d; } }
  function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }
  function getUsers() { return load('forum_users', {}); }
  function saveUsers(u) { save('forum_users', u); }
  function getPosts() { return load('forum_posts', []); }
  function savePosts(p) { save('forum_posts', p); }

  // ─── 初始化数据 ───
  if (!localStorage.getItem('forum_users')) {
    saveUsers({ 'admin': 'admin123', 'test': '123456' });
  }
  if (!localStorage.getItem('forum_posts') || getPosts().length === 0) {
    savePosts([
      {
        id: 1, author: 'admin', title: '欢迎来到在线论坛',
        content: '这是一个测试论坛，大家可以注册账号、发帖、回复、删除帖子。快来试试吧！',
        time: '30分钟前',
        replies: [
          { id: 1, author: 'test', content: '来了来了，论坛看起来不错！', time: '20分钟前' },
          { id: 2, author: 'admin', content: '欢迎欢迎，随便逛逛~', time: '15分钟前' }
        ]
      },
      {
        id: 2, author: 'admin', title: '论坛使用说明',
        content: '1. 点击"注册"创建一个新账号\n2. 登录后即可发帖\n3. 可以回复别人的帖子\n4. 只能删除自己发的帖子',
        time: '25分钟前',
        replies: [
          { id: 1, author: 'test', content: '明白了，谢谢说明！', time: '22分钟前' }
        ]
      },
      {
        id: 3, author: 'test', title: '今天天气真不错',
        content: '阳光明媚，适合出去走走。大家今天都在忙什么呀？',
        time: '18分钟前',
        replies: []
      },
      {
        id: 4, author: 'admin', title: '大家有什么想看的功能',
        content: '如果有任何建议或者需求，可以在这个帖子下面回复告诉我。',
        time: '10分钟前',
        replies: [
          { id: 1, author: 'test', content: '能不能加一个点赞功能？', time: '8分钟前' },
          { id: 2, author: 'admin', content: '好建议，后续会考虑加入！', time: '5分钟前' }
        ]
      },
      {
        id: 5, author: 'test', title: '分享一个编程小技巧',
        content: '写代码的时候记得多写注释，不然过两周你自己都看不懂了（笑）',
        time: '5分钟前',
        replies: []
      }
    ]);
  }

  let currentUser = null;
  let nextPostId = Math.max(...getPosts().map(p => p.id), 0) + 1;

  function getNextReplyId(postId) {
    const posts = getPosts();
    const post = posts.find(p => p.id === postId);
    if (!post || !post.replies || post.replies.length === 0) return 1;
    return Math.max(...post.replies.map(r => r.id)) + 1;
  }

  function showMsg(id, text, ok) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + (ok ? 'ok' : 'err');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2500);
  }

  // ─── 登录/注册 ───
  function switchTab(tab) {
    const tabs = document.querySelectorAll('.auth-box .tabs span');
    tabs[0].className = tab === 'login' ? 'active' : '';
    tabs[1].className = tab === 'register' ? 'active' : '';
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('msg').style.display = 'none';
  }

  function doRegister() {
    const user = document.getElementById('regUser').value.trim();
    const pass = document.getElementById('regPass').value;
    const pass2 = document.getElementById('regPass2').value;
    if (!user) { showMsg('msg', '请输入用户名', false); return; }
    if (user.length < 2) { showMsg('msg', '用户名至少2个字符', false); return; }
    if (!pass) { showMsg('msg', '请输入密码', false); return; }
    if (pass.length < 3) { showMsg('msg', '密码至少3个字符', false); return; }
    if (pass !== pass2) { showMsg('msg', '两次密码不一致', false); return; }
    const users = getUsers();
    if (users[user]) { showMsg('msg', '用户名已存在', false); return; }
    users[user] = pass;
    saveUsers(users);
    showMsg('msg', '注册成功！请登录', true);
    document.getElementById('regUser').value = '';
    document.getElementById('regPass').value = '';
    document.getElementById('regPass2').value = '';
    setTimeout(() => switchTab('login'), 800);
  }

  function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    if (!user || !pass) { showMsg('msg', '请输入用户名和密码', false); return; }
    const users = getUsers();
    if (!users[user] || users[user] !== pass) { showMsg('msg', '用户名或密码错误', false); return; }
    currentUser = user;
    document.getElementById('header').style.display = 'flex';
    document.getElementById('currentUser').textContent = '欢迎, ' + user;
    document.getElementById('authPage').style.display = 'none';
    document.getElementById('forumPage').style.display = 'block';
    renderPosts();
  }

  function logout() {
    currentUser = null;
    document.getElementById('header').style.display = 'none';
    document.getElementById('forumPage').style.display = 'none';
    document.getElementById('authPage').style.display = 'block';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    switchTab('login');
  }

  // ─── 发帖 ───
  function addPost() {
    const title = document.getElementById('newTitle').value.trim();
    const content = document.getElementById('newContent').value.trim();
    if (!title) { showMsg('postMsg', '请输入标题', false); return; }
    if (!content) { showMsg('postMsg', '请输入内容', false); return; }
    const posts = getPosts();
    posts.unshift({
      id: nextPostId++, author: currentUser, title: title, content: content,
      time: '刚刚', replies: []
    });
    savePosts(posts);
    document.getElementById('newTitle').value = '';
    document.getElementById('newContent').value = '';
    renderPosts();
  }

  // ─── 删帖 ───
  function deletePost(postId) {
    if (!confirm('确定要删除这条帖子吗？')) return;
    let posts = getPosts();
    posts = posts.filter(p => p.id !== postId);
    savePosts(posts);
    renderPosts();
  }

  // ─── 回复 ───
  function addReply(postId) {
    const input = document.getElementById('replyInput_' + postId);
    const text = input.value.trim();
    if (!text) return;
    const posts = getPosts();
    const post = posts.find(p => p.id === postId);
    if (!post) return;
    if (!post.replies) post.replies = [];
    post.replies.push({
      id: getNextReplyId(postId),
      author: currentUser,
      content: text,
      time: '刚刚'
    });
    savePosts(posts);
    input.value = '';
    renderPosts();
  }

  // ─── 删回复 ───
  function deleteReply(postId, replyId) {
    if (!confirm('确定要删除这条回复吗？')) return;
    const posts = getPosts();
    const post = posts.find(p => p.id === postId);
    if (!post) return;
    post.replies = post.replies.filter(r => r.id !== replyId);
    savePosts(posts);
    renderPosts();
  }

  // ─── 渲染 ───
  function renderPosts() {
    const posts = getPosts();
    const users = getUsers();
    document.getElementById('statUsers').textContent = Object.keys(users).length;
    document.getElementById('statPosts').textContent = posts.length;

    const list = document.getElementById('postList');
    if (posts.length === 0) {
      list.innerHTML = '<div class="empty">暂无帖子，快来发布第一条吧</div>';
      return;
    }

    list.innerHTML = posts.map(p => {
      const isMine = (p.author === currentUser);
      const repliesHtml = (p.replies || []).map(r => `
        <div class="reply-item">
          <span class="reply-author">${esc(r.author)}</span>
          <span class="reply-text">${esc(r.content)}</span>
          <span class="reply-right">
            <span class="reply-time">${esc(r.time)}</span>
            ${r.author === currentUser ? '<button class="reply-del" onclick="deleteReply('+p.id+','+r.id+')">删除</button>' : ''}
          </span>
        </div>
      `).join('');

      return `
        <div class="post-card">
          <div class="post-meta">
            <span><span class="author">${esc(p.author)}</span> · ${esc(p.time)}</span>
            <span class="ops">
              ${isMine ? '<button class="btn btn-danger btn-sm" onclick="deletePost('+p.id+')">删除帖子</button>' : ''}
            </span>
          </div>
          <div class="post-title">${esc(p.title)}</div>
          <div class="post-content">${esc(p.content)}</div>
          <div class="replies-area">
            ${(p.replies && p.replies.length) ? repliesHtml : '<div style="color:#ccc;font-size:13px;padding:6px 0;">暂无回复</div>'}
            <div class="reply-form">
              <input type="text" id="replyInput_${p.id}" placeholder="写回复..." onkeydown="if(event.key==='Enter')addReply(${p.id})">
              <button class="btn btn-primary btn-sm" onclick="addReply(${p.id})">回复</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
